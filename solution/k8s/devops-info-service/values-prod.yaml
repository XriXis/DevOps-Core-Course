replicaCount: 1

configMaps:
  env:
    data:
      APP_ENV: prod
      LOG_LEVEL: info
      FEATURE_VISITS: "true"
      FEATURE_CONFIG_RELOAD: checksum-restart

image:
  tag: "0.1.0"

service:
  type: LoadBalancer
  nodePort: null

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 3

persistence:
  size: 200Mi
