nameOverride: ""
fullnameOverride: ""
partOf: devops-lab10
component: web

replicaCount: 3
revisionHistoryLimit: 5

image:
  repository: xrixis/devops-i-lobazov
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

env:
  - name: HOST
    value: 0.0.0.0
  - name: PORT
    value: "5000"
  - name: DEBUG
    value: "false"
  - name: RELEASE_VERSION
    value: "v1"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 122
  runAsGroup: 122
  fsGroup: 122
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  path: /health
  port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  path: /health
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

automountServiceAccountToken: false

extraLabels: {}

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: local.example.com
      paths:
        - path: /app1(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: devops-info-ingress-tls
      hosts:
        - local.example.com

hooks:
  enabled: true
  image: busybox:1.36
  deletePolicy: hook-succeeded
  preInstall:
    weight: -5
  postInstall:
    weight: 5
    path: /health
