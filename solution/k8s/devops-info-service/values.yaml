nameOverride: ""
fullnameOverride: ""
partOf: devops-lab12
component: web

replicaCount: 1
revisionHistoryLimit: 5

image:
  repository: xrixis/devops-i-lobazov
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

env:
  host: 0.0.0.0
  port: "5000"
  debug: "false"
  releaseVersion: "v1"
  configPath: /config/config.json
  visitsFile: /data/visits

configMaps:
  file:
    name: ""
    mountPath: /config
    fileName: config.json
  env:
    name: ""
    data:
      APP_ENV: dev
      LOG_LEVEL: info
      FEATURE_VISITS: "true"
      FEATURE_CONFIG_RELOAD: checksum-restart

secret:
  create: true
  name: ""
  type: Opaque
  data:
    username: "change-me-user"
    password: "change-me-password"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 122
  runAsGroup: 122
  fsGroup: 122
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  path: /health
  port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  path: /health
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: false

extraLabels: {}

persistence:
  enabled: true
  name: ""
  mountPath: /data
  accessModes:
    - ReadWriteOnce
  size: 100Mi
  storageClass: ""

vault:
  enabled: false
  role: devops-info-service
  authPath: auth/kubernetes
  secretPath: secret/data/devops-info-service/config
  injectFileName: app-secrets.txt
  templateFileName: app.env
  injectCommand: ""
  secrets:
    usernameKey: username
    passwordKey: password

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: local.example.com
      paths:
        - path: /app1(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: devops-info-ingress-tls
      hosts:
        - local.example.com

hooks:
  enabled: true
  image: busybox:1.36
  deletePolicy: hook-succeeded
  preInstall:
    weight: -5
  postInstall:
    weight: 5
    path: /health
