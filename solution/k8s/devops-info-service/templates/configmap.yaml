apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-info-service.configFileMapName" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
data:
  {{ .Values.configMaps.file.fileName }}: |-
{{ .Files.Get "files/config.json" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-info-service.envConfigMapName" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.configMaps.env.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
