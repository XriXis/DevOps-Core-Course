nameOverride: ""
fullnameOverride: ""
partOf: devops-lab10
component: web

replicaCount: 2
revisionHistoryLimit: 3

image:
  repository: xrixis/devops-info-service-rust
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

env:
  - name: HOST
    value: 0.0.0.0
  - name: PORT
    value: "5000"
  - name: DEBUG
    value: "false"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 122
  runAsGroup: 122
  fsGroup: 122
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  path: /health
  port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  path: /health
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

automountServiceAccountToken: false

extraLabels: {}
