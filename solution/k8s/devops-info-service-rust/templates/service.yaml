apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-service-rust.fullname" . }}
  labels:
    {{- include "devops-info-service-rust.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "devops-info-service-rust.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
