version: "3.8"

services:
  loki:
    image: grafana/loki:3.0.0
    command:
      - "-config.file=/etc/loki/config.yml"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  promtail:
    image: grafana/promtail:3.0.0
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail-positions:/tmp
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  grafana:
    image: grafana/grafana:12.3.1
    env_file:
      - .env
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_USERS_DEFAULT_THEME: "light"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  app-python:
    build:
      context: ../app_python
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      DEBUG: "false"
    ports:
      - "8000:5000"
    labels:
      logging: "promtail"
      app: "devops-python"
    networks:
      - logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  app-rust:
    build:
      context: ../app_rust
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      DEBUG: "false"
      RUST_LOG: "info,actix_web=info"
    ports:
      - "8001:5000"
    labels:
      logging: "promtail"
      app: "devops-rust"
    networks:
      - logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

volumes:
  loki-data:
  grafana-data:
  promtail-positions:

networks:
  logging:
    driver: bridge
