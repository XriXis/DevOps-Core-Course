---
- name: Docker installation block
  become: true
  tags:
    - docker_install
  block:
    - name: Ensure apt prerequisites are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      notify: Restart docker

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_apt_arch_map[ansible_architecture] | default('amd64') }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present
        filename: docker
      notify: Restart docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: Install Python Docker bindings
      ansible.builtin.apt:
        name: python3-docker
        state: present

  rescue:
    - name: Wait before Docker apt metadata retry
      ansible.builtin.pause:
        seconds: 10

    - name: Retry apt cache update for Docker repositories
      ansible.builtin.apt:
        update_cache: true

    - name: Retry Docker GPG key download
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Retry Docker apt repository registration
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_apt_arch_map[ansible_architecture] | default('amd64') }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Retry Docker package installation
      ansible.builtin.apt:
        name: "{{ docker_packages + ['python3-docker'] }}"
        state: present
        update_cache: true

  always:
    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Docker configuration block
  become: true
  tags:
    - docker_config
  block:
    - name: Ensure users belong to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

  rescue:
    - name: Log docker group assignment failure
      ansible.builtin.debug:
        msg: "Failed to update docker group membership"

  always:
    - name: Confirm Docker service state after configuration
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
