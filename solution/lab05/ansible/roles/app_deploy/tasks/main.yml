---
- name: Log in to Docker Hub
  community.docker.docker_login:
    registry_url: https://index.docker.io/v1/
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull
    force_source: true

- name: Stop existing container if running
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  failed_when: false

- name: Remove existing container if present
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    published_ports:
      - "{{ app_port }}:{{ app_port }}"
    env: "{{ app_env }}"
  notify: restart application container

- name: Wait for application port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ app_port }}"
    timeout: "{{ app_healthcheck_timeout }}"

- name: Verify health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}{{ app_healthcheck_path }}"
    method: GET
    status_code: 200
  register: app_health_result
  retries: 5
  delay: 3
  until: app_health_result.status == 200
