---
- name: Ensure monitoring directory structure exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ monitoring_project_dir }}"
    - "{{ monitoring_project_dir }}/loki"
    - "{{ monitoring_project_dir }}/promtail"
    - "{{ monitoring_project_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_project_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_project_dir }}/grafana/dashboards"

- name: Render monitoring stack templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: docker-compose.yml.j2
      dest: "{{ monitoring_project_dir }}/docker-compose.yml"
    - src: loki-config.yml.j2
      dest: "{{ monitoring_project_dir }}/loki/config.yml"
    - src: promtail-config.yml.j2
      dest: "{{ monitoring_project_dir }}/promtail/config.yml"
    - src: grafana-datasource.yml.j2
      dest: "{{ monitoring_project_dir }}/grafana/provisioning/datasources/loki.yml"
    - src: grafana-dashboard-provider.yml.j2
      dest: "{{ monitoring_project_dir }}/grafana/provisioning/dashboards/dashboard-provider.yml"
    - src: grafana-dashboard.json.j2
      dest: "{{ monitoring_project_dir }}/grafana/dashboards/lab07-observability.json"

- name: Deploy monitoring stack with Docker Compose v2
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_project_dir }}"
    state: present
    pull: always
    recreate: auto
  register: monitoring_compose_result

- name: Wait for Loki port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_loki_port }}"
    timeout: 90

- name: Wait for Grafana port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_grafana_port }}"
    timeout: 90

- name: Verify Loki readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_loki_port }}/ready"
    method: GET
    status_code: 200
  register: monitoring_loki_ready
  retries: 10
  delay: 5
  until: monitoring_loki_ready.status == 200

- name: Verify Grafana API health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/health"
    method: GET
    status_code: 200
    user: "{{ monitoring_grafana_admin_user }}"
    password: "{{ monitoring_grafana_admin_password }}"
    force_basic_auth: true
  register: monitoring_grafana_ready
  retries: 10
  delay: 5
  until: monitoring_grafana_ready.status == 200

- name: Report compose deployment result
  ansible.builtin.debug:
    var: monitoring_compose_result
