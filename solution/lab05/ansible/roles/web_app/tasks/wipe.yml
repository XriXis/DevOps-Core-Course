---
- name: Wipe web application deployment
  when: web_app_wipe | bool
  become: true
  tags:
    - web_app_wipe
  block:
    - name: Stop and remove application stack
      community.docker.docker_compose_v2:
        project_src: "{{ web_app_compose_project_dir }}"
        state: absent
        remove_images: local
      failed_when: false

    - name: Remove legacy standalone container
      community.docker.docker_container:
        name: "{{ web_app_app_name }}"
        state: absent
      failed_when: false

    - name: Remove docker-compose file
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}"
        state: absent

    - name: Confirm wipe completion
      ansible.builtin.debug:
        msg: "Application {{ web_app_app_name }} wiped successfully"
